    sections:
      - type: about-detail
        theme: white
        body:
          zh: Wilnes Management LTD 是一家位于加拿大温哥华的北美市场进入与业务增长合作伙伴，专注帮助中国品牌与制造企业进入加拿大及美国市场。我们通过市场战略、业务开发与本地执行支持，帮助企业实现可持续增长。
          en: Wilnes Management LTD is a Vancouver-based North America market entry and business growth partner helping Chinese brands and manufacturers expand into Canada and the United States. We support companies through strategic market entry, business development, and local execution to enable sustainable growth in North America.
        whatWeDo:
          - title: { zh: 市场进入战略, en: Market Entry Strategy }
            body:
              zh: 帮助企业明确市场定位，理解北美市场环境，并制定有效的进入策略
              en: We help companies define their positioning, understand the North American market landscape, and build effective go-to-market strategies.
          - title: { zh: 业务开发, en: Business Development }
            body:
              zh: 为品牌与制造企业对接北美渠道商、零售商及OEM/ODM合作伙伴
              en: We connect brands and manufacturers with distributors, retailers, and OEM/ODM partners across Canada and the United States.
          - title: { zh: 增长执行, en: Growth Execution }
            body:
              zh: 支持渠道拓展、合作管理及本地市场执行落地
              en: We support channel development, partnership management, and on-the-ground execution in the North American market.
        whoWeWorkWith:
          - { zh: 进入北美市场的中国消费品牌, en: Chinese consumer brands entering North America }
          - { zh: 寻找OEM/ODM机会的制造企业, en: Manufacturers seeking OEM/ODM opportunities }
          - { zh: 希望拓展渠道与零售合作的企业, en: Companies expanding into new distribution and retail channels }
          - { zh: 需要北美本地代表的公司, en: Businesses requiring a North America local representative }
        whyUs:
          - zh: 我们是一家位于温哥华的北美市场进入与执行合作伙伴，具备真实的本地执行能力。
            en: We are a Vancouver-based North America market entry and execution partner with real on-the-ground capability.
          - zh: 我们结合中国制造与品牌体系的深度理解，以及北美零售与分销体系的实际经验。
            en: We combine deep understanding of Chinese manufacturing and brand ecosystems with practical experience in the North American retail and distribution landscape.
          - zh: 我们的双语与双文化团队能够降低沟通成本，减少执行摩擦，并加速跨境决策效率。
            en: Our bilingual and bicultural team reduces communication friction, improves execution efficiency, and accelerates cross-border decision-making.
          - zh: 我们不仅提供建议，更帮助企业在加拿大和美国实现真实市场进入、合作建立与增长执行。
            en: "We don\u2019t just advise \u2014 we help execute real market entry, partnership development, and business growth in Canada and the United States."
        ctaTitle:
          zh: 让我们一起制定你的北美增长战略
          en: "Let's Build Your North America Growth Strategy"
        ctaBody:
          zh: 如果你正在计划进入或拓展加拿大与美国市场，我们很乐意支持你的业务发展。
          en: If you are planning to enter or expand in Canada and the United States, we would be happy to support your journey.
        ctaLabel: { zh: 预约咨询, en: Book a Consultation }
        ctaHref: "#inquiry"