  # ═══════════════════════════ About Page ═══════════════════════════
  - slug: about
    # title: { zh: 关于我们, en: About }
    description:
      zh: Wilne Management LTD — 北美市场进入与业务增长合作伙伴。
      en: Wilne Management LTD — North America market entry and business growth partner.
    masthead:
      eyebrow: { zh: 关于我们, en: About Us }
      title: { zh: 关于 Wilne Management LTD, en: About Wilne Management LTD }
      body:
          zh: Wilne Management LTD 总部位于加拿大温哥华，是一家专注于北美市场进入与业务增长的战略合作伙伴。我们致力于帮助中国品牌与制造企业成功拓展北美市场，通过提供市场进入战略、商业拓展以及本地化执行支持，协助企业实现高效、可持续的海外增长，同时，我们也为北美企业提供中国OEM/ODM供应链对接服务，帮助其寻找经过筛选与验证的优质制造合作伙伴，支持产品开发、贴牌生产以及跨境供应链协作。
          en: Wilne Management LTD is a Vancouver-based, North American market-entry and business growth partner. We specialize in helping Chinese brands and manufacturers successfully expand into the Canadian and U.S. markets by providing strategic go-to-market planning, business development, and hands-on local execution. In addition, we support North American companies in sourcing and partnering with verified OEM/ODM manufacturers in China, enabling efficient private-label production, product development, and cross-border supply chain collaboration.
    sections:
      # ── About Detail (Company description + Mission + CTA) ──
      - type: about-detail
        theme: white
        mission:
          title:
            zh: 我们的使命
            en: Our Mission
          body:
            zh: 通过战略规划、商业合作与执行落地，助力企业在中国与北美市场之间实现跨境拓展与增长。
            en: To help businesses expand between China and North America through strategy, partnerships, and execution.
        team:
          eyebrow:
            zh: 我们的团队
            en: Our Team
          title:
            zh: 核心团队
            en: Leadership Team
          members:
            - name: Maggie
              role:
                zh: 联合创始人 | 北美市场战略负责人
                en: Co-Founder | North America Market Strategy Lead
              bio:
                zh: 常驻加拿大温哥华，专注北美市场进入策略、品牌定位与业务拓展，帮助中国品牌与制造企业制定清晰的市场进入路径与执行方案。
                en: Based in Vancouver, Maggie focuses on North America market entry strategy, brand positioning, and business development. She supports Chinese brands and manufacturers in building structured market entry plans and execution strategies.
              photo: maggie-avatar.jpg
            - name: Shane
              role:
                zh: 联合创始人 | 北美商务拓展负责人
