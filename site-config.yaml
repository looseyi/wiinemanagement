  # ═══════════════════════════ About Page ═══════════════════════════
  - slug: about
    title: { zh: 关于我们, en: About }
    description:
      zh: Wilnes Management LTD — 北美市场进入与业务增长合作伙伴。
      en: Wilnes Management LTD — North America market entry and business growth partner.
    masthead:
      eyebrow: { zh: 关于我们, en: About Us }
      title: { zh: 关于 Wilnes Management LTD, en: About Wilnes Management LTD }
      body: { zh: "", en: "" }
    sections:
      - type: about-detail
        theme: white
        body:
          zh: Wilnes Management LTD 总部位于加拿大温哥华，是一家专注于北美市场进入与业务增长的战略合作伙伴。我们致力于帮助中国品牌与制造企业成功拓展北美市场，通过提供市场进入战略、商业拓展以及本地化执行支持，协助企业实现高效、可持续的海外增长，同时，我们也为北美企业提供中国OEM/ODM供应链对接服务，帮助其寻找经过筛选与验证的优质制造合作伙伴，支持产品开发、贴牌生产以及跨境供应链协作。
          en: Wilnes Management LTD is a Vancouver-based, North American market-entry and business growth partner. We specialize in helping Chinese brands and manufacturers successfully expand into the Canadian and U.S. markets by providing strategic go-to-market planning, business development, and hands-on local execution. In addition, we support North American companies in sourcing and partnering with verified OEM/ODM manufacturers in China, enabling efficient private-label production, product development, and cross-border supply chain collaboration.
        mission:
          title:
            zh: 我们的使命
            en: Our Mission
          body:
            zh: 通过战略规划、商业合作与执行落地，助力企业在中国与北美市场之间实现跨境拓展与增长。
            en: To help businesses expand between China and North America through strategy, partnerships, and execution.
        team:
          eyebrow:
            zh: 我们的团队
            en: Our Team
          title:
            zh: 核心团队
            en: Leadership Team
          members:
            - name: Maggie
              role:
                zh: 联合创始人 | 北美市场战略负责人
                en: Co-Founder | North America Market Strategy Lead
              bio:
                zh: 常驻加拿大温哥华，专注北美市场进入策略、品牌定位与业务拓展，帮助中国品牌与制造企业制定清晰的市场进入路径与执行方案。
                en: Based in Vancouver, Maggie focuses on North America market entry strategy, brand positioning, and business development. She supports Chinese brands and manufacturers in building structured market entry plans and execution strategies.
              photo: maggie-avatar.jpg
            - name: Shane
              role:
                zh: 联合创始人 | 北美商务拓展负责人
                en: Co-Founder | North America Business Development Lead
              bio:
                zh: 拥有20年以上企业管理与商务拓展经验，专注北美B2B商业合作、渠道开发及跨文化商务沟通，负责本地合作资源对接与项目执行落地。
                en: With over 20 years of experience in business management and development, Shane specializes in North American B2B partnerships, channel development, and cross-cultural business communication. He leads local partner outreach and supports execution of commercial opportunities in Canada and the U.S.
              photo: ""
        whyUs:
          - zh: 我们是一家位于温哥华的北美市场进入与执行合作伙伴，具备真实的本地执行能力。
            en: We are a Vancouver-based North America market entry and execution partner with real on-the-ground capability.
          - zh: 我们结合中国制造与品牌体系的深度理解，以及北美零售与分销体系的实际经验。
            en: We combine deep understanding of Chinese manufacturing and brand ecosystems with practical experience in the North American retail and distribution landscape.
          - zh: 我们的双语与双文化团队能够降低沟通成本，减少执行摩擦，并加速跨境决策效率。
            en: Our bilingual and bicultural team reduces communication friction, improves execution efficiency, and accelerates cross-border decision-making.
          - zh: 我们不仅提供建议，更帮助企业在加拿大和美国实现真实市场进入、合作建立与增长执行。
            en: "We don’t just advise — we help execute real market entry, partnership development, and business growth in Canada and the United States."
        ctaTitle:
          zh: 让我们一起制定你的北美增长战略
          en: "Let's Build Your North America Growth Strategy"
        ctaBody:
          zh: 如果你正在计划进入或拓展加拿大与美国市场，我们很乐意支持你的业务发展。
          en: If you are planning to enter or expand in Canada and the United States, we would be happy to support your journey.
        ctaLabel: { zh: 预约咨询, en: Book a Consultation }
        ctaHref: "#inquiry"

      # ── FAQ Section ──
      - type: faq
        theme: blue
        eyebrow:
          zh: 常见问题
          en: FAQ
        title:
          zh: 常见问题
          en: Frequently Asked Questions
        items:
          - question:
              zh: 你们只服务温哥华地区的客户吗？
              en: Do you only serve clients located in Vancouver?
            answer:
              zh: 我们服务范围覆盖整个加拿大和美国市场。
              en: No. While we are based in Vancouver, our services and coverage extend across the entire Canadian and U.S. markets.
          - question:
              zh: 咨询收费吗？
              en: Is there a fee for the initial consultation?
            answer:
              zh: 首次30分钟咨询免费。我们会先了解你的业务和目标，再提出合作方案。
              en: Your first 30-minute consultation is completely free. This initial session allows us to understand your business, assess your goals, and then present you with a tailored partnership proposal.
          - question:
              zh: 我没有任何出海经验，从哪里开始？
              en: I have zero experience with overseas expansion. Where do I even start?
            answer:
              zh: 直接联系我们，告诉我们你的产品和目标市场。我们会帮你梳理清晰路径，从合规到渠道到营销，全程落地支持。
              en: Just reach out to us! Simply share your product details and target audience, and we'll guide you through the rest. We help you map out a clear roadmap—covering everything from local compliance to sales channels and marketing—and provide end-to-end execution support.
          - question:
              zh: 合作流程是怎样的？
              en: What does the collaboration process look like?
            answer:
              zh: 免费咨询 → 方案定制 → 签约启动 → 执行落地 → 持续增长支持。每个阶段我们都会与你同步进展，确保全程透明可控。
              en: "Our proven process is straightforward: Free Consultation → Customized Proposal → Agreement & Kickoff → Execution & Implementation → Ongoing Growth Support. We keep you informed at every milestone to ensure full transparency and complete peace of mind."

