  - slug: case-studies/gtm-launch
    title: { zh: "护肤品牌北美冷启动", en: "90-Day North America GTM Launch" }
    description:
      zh: 协助中国护肤品牌 90 天内跑通北美市场冷启动全链路。
      en: Helped a Chinese skincare brand complete a full North America market entry in 90 days.
    masthead:
      eyebrow: { zh: 案例详情, en: Case Study }
      title: { zh: "护肤品牌北美冷启动", en: "90-Day North America GTM Launch" }
      body: { zh: "", en: "" }
    sections:
      - type: case-study-full
        theme: white
        blocks:
          - type: metrics
            items:
              - label: { zh: 启动周期, en: Time-to-Market }
                value: { zh: 90天完成市场进入准备, en: 90 Days }
              - label: { zh: 合规落地, en: Compliance }
                value: { zh: Health Canada & FDA 双认证支持, en: Health Canada & U.S. FDA cleared }
              - label: { zh: 商务进展, en: BD Pipeline }
                value: { zh: 成功推进 5 家本土主力零售/分销商谈, en: Initiated negotiations with 5 major regional retailers/distributors }
          - type: section
            title: { zh: 一、客户背景, en: Background }
            body:
              zh: 某国产中高端功效护肤品牌（拥有8个核心SKU），在没有海外团队、也没有国际市场运营经验的情况下，希望进入加拿大及美国市场。该品牌在国内具备一定市场基础，但在北美市场尚无品牌认知、渠道资源及销售网络。
              en: A mid-to-high-end Chinese skincare brand with 8 SKUs sought to enter the Canadian and U.S. markets without any overseas team or prior international operating experience. While the brand had strong domestic performance, it had no presence, distribution, or awareness in North America.
          - type: section
            title: { zh: 二、项目挑战, en: Challenge }
            items:
              - { zh: 北美市场品牌认知度为零, en: Zero brand awareness in North American market }
              - { zh: 缺乏现有分销商及零售渠道资源, en: No existing distributor or retail network }
              - { zh: 产品配方需符合加拿大 Health Canada 化妆品法规, en: Product formulation required compliance with Health Canada cosmetic regulations }
              - { zh: 团队英语商务沟通能力有限，缺乏海外运营经验, en: Limited English communication capability within internal team }
          - type: section
            title: { zh: 三、我们的解决方案, en: Our Strategy }
            items:
              - { zh: 协助完成加拿大 Health Canada 及美国 FDA 化妆品合规支持, en: Health Canada + U.S. FDA cosmetic regulatory compliance support }
              - { zh: 北美市场调研及竞品分析与定位策略制定, en: North American market research and competitive positioning strategy }
              - { zh: 搭建Shopify英文独立站并完成基础本地化优化, en: Shopify-based English e-commerce store development }
              - { zh: 制定Instagram与TikTok社媒市场进入策略, en: Instagram & TikTok go-to-market strategy }
              - { zh: 执行KOL/KOC种草投放（200份样品）, en: Influencer seeding campaign (200 KOL/KOC samples) }
              - { zh: 对接加拿大零售买手及区域分销渠道, en: Initial outreach to Canadian retail buyers and regional distributors }
          - type: section
            title: { zh: 四、执行过程, en: Implementation }
            items:
              - { zh: 完成加拿大及美国市场合规资料准备与备案支持, en: Completed regulatory compliance documentation for Canada and the U.S. }
              - { zh: 搭建并上线Shopify独立站，完成本地化品牌呈现, en: Built and launched Shopify storefront with localized positioning }
              - { zh: 执行200份红人样品投放计划, en: Executed influencer seeding campaign (200 samples distributed) }
              - { zh: 启动3个零售渠道及2个分销商的商务沟通, en: Initiated discussions with 3 retail channels and 2 distributors }
              - { zh: 收集北美首批真实用户反馈, en: Collected first wave of real consumer feedback from North American users }
          - type: section
            title: { zh: 五、项目成果, en: Results }
            items:
              - { zh: 跑通北美市场"合规-冷启动-渠道拓展"全链路闭环, en: Successfully completed initial North America market entry phase }
              - { zh: 成功搭建北美本土零售及分销商准入管线, en: Established an initial retail and distributor pipeline }
              - { zh: 通过精准红人置换，获取首批核心目标市场的真实用户好评与测品反馈, en: Generated real consumer feedback from target market }
              - { zh: 项目正式进入商业合作与渠道谈判阶段, en: Moved into commercial negotiation phase }
          - type: status
            label: { zh: 当前状态, en: Current Status }
            value:
              zh: 进行中 — 合规完成，独立站已上线，红人投放已执行，目前处于分销商谈判阶段。
              en: "Ongoing — Compliance completed, store launched, influencer campaign executed, currently in distributor negotiation stage."

  - slug: case-studies/private-label
    title: { zh: "精品买手店自有品牌供应链开发", en: "Private Label Supply Chain Setup" }
    description:
      zh: 加拿大精品买手店 · 自有品牌供应链开发。
      en: Sourced and onboarded verified Chinese manufacturers for a Vancouver beauty buyer's private label line.
    masthead:
      eyebrow: { zh: 案例详情, en: Case Study }
      title: { zh: "精品买手店自有品牌供应链开发", en: "Private Label Supply Chain Setup for a Vancouver Beauty Buyer" }
      body: { zh: "", en: "" }
    sections:
      - type: case-study-full
        theme: white
        blocks:
          - type: section
            title: { zh: 一、客户背景, en: Background }
            body:
              zh: 温哥华某精品美妆买手店计划开发自有品牌产品线，但缺乏中国供应链资源及跨境采购经验。
              en: A boutique beauty buyer store based in Vancouver aimed to develop its own private label product line but lacked access to reliable Chinese manufacturers and cross-border sourcing experience.
          - type: section
            title: { zh: 二、项目挑战, en: Challenge }
            items:
              - { zh: 缺乏可靠的中国化妆品代工厂资源, en: No direct access to verified cosmetic manufacturers in China }
              - { zh: 缺乏系统化供应商筛选与评估体系, en: Lack of structured supplier evaluation system }
              - { zh: 缺乏跨境采购及质量控制经验, en: No cross-border sourcing or quality control experience }
              - { zh: 缺乏产品开发流程管理能力, en: No established product development workflow }
          - type: section
            title: { zh: 三、我们的解决方案, en: Our Strategy }
            items:
              - { zh: 在华东地区筛选并对接化妆品代工厂资源, en: Sourcing and screening cosmetic manufacturers in East China }
              - { zh: 根据产品需求及预算筛选3家合格工厂, en: Shortlisting 3 qualified factories based on product requirements and budget }
              - { zh: 协调样品开发及跨境物流交付, en: Coordinating sample development and international logistics }
              - { zh: 制作英文供应商能力介绍资料（Capability Deck）, en: Developing English capability decks for supplier communication }
              - { zh: 提供MOQ、价格及质量标准等商务谈判支持, en: Supporting commercial negotiation (MOQ, pricing, QC standards) }
          - type: section
            title: { zh: 四、执行过程, en: Implementation }
            items:
              - { zh: 在中国筛选并评估3家符合要求的化妆品代工厂, en: Identified and evaluated 3 manufacturing partners in China }
              - { zh: 协调样品打样及跨境寄送全流程, en: Coordinated sampling and cross-border delivery process }
              - { zh: 负责客户与工厂之间的中英双语沟通对接, en: Facilitated bilingual communication between buyer and factories }
              - { zh: 整理工厂能力资料（产能、资质、生产体系等），用于决策判断, en: Structured supplier capability documentation for decision-making }
              - { zh: 协助搭建初步商务对接与报价沟通框架, en: Supported initial commercial negotiation framework }
          - type: section
            title: { zh: 五、项目成果, en: Results }
            items:
              - { zh: 成功筛选出3家符合条件的代工厂并进入候选名单, en: 3 manufacturers successfully shortlisted }
              - { zh: 完成样品开发并顺利寄送至加拿大客户, en: Sample development completed and shipped to Canada }
              - { zh: 协助客户建立起一套标准化的海外供应商评估与长效筛选机制, en: Structured supplier evaluation process established }
              - { zh: 项目已顺利过渡至产品合规测试与本地化市场适配性评估阶段, en: Product testing phase initiated by client }
          - type: status
            label: { zh: 当前状态, en: Current Status }
            value:
              zh: 测试阶段 — 样品已交付，客户正在评估产品与市场的契合度及质量表现。
              en: "Testing phase — Samples delivered, client evaluating product-market fit and quality performance."

